version: "3.8"

# ⚠️ 重要：35 服务器上所有容器必须使用 host 网络模式
# Docker 默认创建的 bridge 网络使用 172.x.x.x 段，
# 会与公司内网 172.60.x.x 段冲突导致路由异常。

services:
  # PostgreSQL 数据库 (host 网络模式，监听 9627)
  postgres:
    image: postgres:16-alpine
    container_name: onesai-db
    network_mode: host
    environment:
      POSTGRES_USER: onesai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-onesai_Pr0d!2026}
      POSTGRES_DB: ones_ai_platform
    command: >
      postgres
        -c listen_addresses='127.0.0.1'
        -c port=9627
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 后端 FastAPI (host 网络模式，监听 APP_PORT=9620)
  backend:
    build: ./backend
    image: ones-ai-backend:latest
    container_name: onesai-backend
    network_mode: host
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  # 前端 Nginx (host 网络模式，nginx 监听 9621)
  frontend:
    build: ./frontend
    image: ones-ai-frontend:latest
    container_name: onesai-frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

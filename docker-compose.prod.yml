version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: onesai-db
    environment:
      POSTGRES_USER: onesai
      POSTGRES_PASSWORD: onesai123
      POSTGRES_DB: ones_ai_platform
    ports:
      - "9627:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 后端 FastAPI (host 网络模式，监听 APP_PORT=9620)
  backend:
    build: ./backend
    image: ones-ai-backend:latest
    container_name: onesai-backend
    network_mode: host
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  # 前端 Nginx (host 网络模式，nginx 监听 9621)
  frontend:
    build: ./frontend
    image: ones-ai-frontend:latest
    container_name: onesai-frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

